<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dente de Leão</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Georgia',serif;
  background:linear-gradient(168deg,#08244e 0%,#162f6a 14%,#6b4e8a 37%,#b8643a 60%,#e09a58 76%,#eedbb0 100%);
}
.screen{
  position:absolute;top:0;right:0;bottom:0;left:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  transition:opacity 2.4s ease;
  pointer-events:auto;
}
.off{opacity:0!important;pointer-events:none!important}
p{
  color:rgba(255,255,255,.92);
  font-family:'Georgia',serif;font-style:italic;
  text-shadow:0 1px 18px rgba(0,0,0,.55);
  text-align:center;margin:0;
}
svg.main{width:310px;max-height:68vh;overflow:visible}

@keyframes fly-seed{
  0%  {transform:translate(0,0) rotate(0deg);opacity:1}
  10% {opacity:1}
  80% {opacity:.12}
  100%{transform:translate(var(--dx),var(--dy)) rotate(var(--dr));opacity:0}
}
.fly{animation:fly-seed 5.6s cubic-bezier(.12,.8,.32,1) forwards}

#wy{animation:drift-y 6s ease-in-out infinite}
#wx{animation:drift-x 4s ease-in-out infinite}
#wr{animation:drift-r 7s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(255,255,255,.28))}
@keyframes drift-y{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes drift-x{0%,100%{transform:translateX(0)}30%{transform:translateX(13px)}70%{transform:translateX(-8px)}}
@keyframes drift-r{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(9deg)}}

.wish-txt{
  font-size:19px;max-width:300px;line-height:1.9;letter-spacing:.05em;
  position:absolute;bottom:calc(50% - 118px);padding:0 28px;
  transition:opacity 1.6s ease;
}
@keyframes fade-in-up{
  from{opacity:0;transform:translateY(14px)}
  to  {opacity:1;transform:translateY(0)}
}
.do-fade-in{animation:fade-in-up 2s ease-out both}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen">
  <p style="font-size:22px;line-height:1.85;letter-spacing:.06em;max-width:340px;padding:0 44px">
    O instante frágil carrega a força de tudo que está por vir…
  </p>
</div>

<!-- START -->
<div id="start" class="screen off">
  <p style="font-size:28px;letter-spacing:.06em">Achei no parque…</p>
</div>

<!-- SCENE -->
<div id="scene" class="screen off" style="gap:8px">
  <p id="hint" style="font-size:17px;letter-spacing:.08em;margin-bottom:4px;transition:opacity .25s ease">
    Faça um desejo… assopre
  </p>
  <svg id="dsvg" class="main" viewBox="0 0 300 520" style="cursor:pointer"></svg>
  <p id="tap-hint" style="font-size:12px;letter-spacing:.12em;opacity:.42;text-transform:uppercase;margin-top:2px;transition:opacity .25s ease">
    ou toque na flor
  </p>
</div>

<!-- WISH -->
<div id="wish" class="screen off" style="gap:36px">
  <div id="wy"><div id="wx"><div id="wr">
    <svg id="wsvg" viewBox="0 0 120 180" style="width:84px;overflow:visible"></svg>
  </div></div></div>
  <p id="wt1" class="wish-txt" style="opacity:0"></p>
  <p id="wt2" class="wish-txt" style="opacity:0">O que esta semente lhe trará?</p>
</div>

<script>
/* ═══════════════════════════════════════════
   STEP 1 — phase helpers
═══════════════════════════════════════════ */
var SCREENS = ['intro','start','scene','wish'];
function showOnly(id) {
  SCREENS.forEach(function(s) {
    var el = document.getElementById(s);
    if (!el) return;
    if (s === id) { el.classList.remove('off'); }
    else          { el.classList.add('off');    }
  });
}

/* ═══════════════════════════════════════════
   STEP 2 — timing
═══════════════════════════════════════════ */
var blown = false;
showOnly('intro');
setTimeout(function(){ showOnly('start'); }, 4000);
setTimeout(function(){ showOnly('scene'); startMic(); }, 7500);

/* ═══════════════════════════════════════════
   STEP 3 — constants & helpers
═══════════════════════════════════════════ */
var CX=150, CY=165, DRX=50, DRY=52;
var NS = 'http://www.w3.org/2000/svg';
var FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdwhlo8fdEGi7vjCGlY2FeBCBfhYdnQjgGCLKFCGgceTNnjGw/formResponse';

var WISHES = [
  "Cada semente carrega infinitas possibilidades",
  "O futuro encontra-se há um sopro",
  "O vento carrega segredos não contados",
  "O sopro desperta sonhos adormecidos"
];
document.getElementById('wt1').textContent = WISHES[Math.floor(Math.random() * WISHES.length)];

function sr(n) { var x=Math.sin(n*127.1+311.7)*43758.5453; return x-Math.floor(x); }
function contact(a) { return 1/Math.sqrt(Math.cos(a)*Math.cos(a)/DRX/DRX + Math.sin(a)*Math.sin(a)/DRY/DRY); }
function se(tag, attrs) {
  var e = document.createElementNS(NS, tag);
  for (var k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

/* ═══════════════════════════════════════════
   STEP 4 — seed data
═══════════════════════════════════════════ */
var LAYERS = [
  {n:22, r:116, rays:13, rl:24, ah:7,   op:1.00},
  {n:17, r:90,  rays:11, rl:18, ah:6,   op:0.92},
  {n:11, r:70,  rays:9,  rl:13, ah:4.5, op:0.82}
];
var SEEDS = [], sid = 0;
for (var li=0; li<LAYERS.length; li++) {
  var l = LAYERS[li];
  for (var i=0; i<l.n; i++) {
    var spr = sr(sid*11+5);
    var sdeg = spr > 0.42 ? 80 + spr*12 : 42 + spr*65;
    var br = sr(sid*11+6);
    SEEDS.push({
      id:    sid,
      angle: (i/l.n)*Math.PI*2 + (sr(sid*11+1)-0.5)*0.40,
      totalR:l.r + (sr(sid*11+2)-0.5)*18,
      rays:  l.rays,
      rl:    l.rl + (sr(sid*11+3)-0.5)*5,
      ah:    l.ah,
      op:    l.op * (0.88 + sr(sid*11+4)*0.12),
      spread:(sdeg*Math.PI)/180,
      bend:  br > 0.65 ? (br-0.65)*38 : 0,
      bside: sr(sid*11+7) > 0.5 ? 1 : -1,
      dx:    (sr(sid*7+0)-0.28)*780,
      dy:    -(sr(sid*7+1)*540+220),
      dr:    (sr(sid*7+2)-0.5)*980,
      delay: sr(sid*7+3)*1.4
    });
    sid++;
  }
}

/* ═══════════════════════════════════════════
   STEP 5 — build SVG
═══════════════════════════════════════════ */
var seedEls = [];
try {
  var dsvg = document.getElementById('dsvg');

  var defs = se('defs', {});
  var grad = se('radialGradient', {id:'df', cx:'46%', cy:'36%', r:'64%'});
  var stops = [
    {offset:'0%',   'stop-color':'#d0c8bc'},
    {offset:'48%',  'stop-color':'#b4aa9a'},
    {offset:'82%',  'stop-color':'#9a9080'},
    {offset:'100%', 'stop-color':'#78706a'}
  ];
  for (var si=0; si<stops.length; si++) grad.appendChild(se('stop', stops[si]));
  defs.appendChild(grad);
  dsvg.appendChild(defs);

  var stemD = 'M150 520 C146 400 158 330 152 265 C148 230 162 205 156 185';
  dsvg.appendChild(se('path',{d:stemD, stroke:'#286030','stroke-width':'7', fill:'none','stroke-linecap':'round'}));
  dsvg.appendChild(se('path',{d:stemD, stroke:'#52a462','stroke-width':'3', fill:'none','stroke-linecap':'round', opacity:'0.48'}));

  var LEAVES = [
    {d:'M151 345 C146 342 138 337 129 332 C121 327 112 319 108 309 C105 300 107 291 112 287 C108 296 109 306 113 313 C118 320 123 325 129 329 C123 323 117 316 115 308 C116 318 120 326 126 331 C132 336 138 339 144 341 Z', f:'#2d7035', m:'M151 345 C140 339 124 330 110 312'},
    {d:'M153 282 C157 279 164 274 172 268 C179 262 186 253 188 244 C190 235 187 228 183 226 C187 234 187 244 184 252 C181 259 176 265 171 269 C176 262 181 255 182 245 C180 253 177 261 171 267 C165 272 159 276 155 279 Z', f:'#2d7035', m:'M153 282 C163 275 176 263 184 244'},
    {d:'M154 242 C150 240 143 235 136 230 C129 225 122 217 119 209 C117 201 119 194 124 192 C120 200 121 209 125 216 C129 223 134 228 139 232 C133 226 128 218 127 210 C128 218 132 225 138 230 C143 235 149 240 152 242 Z', f:'#267030', m:'M154 242 C143 235 129 224 121 207'}
  ];
  for (var lfi=0; lfi<LEAVES.length; lfi++) {
    dsvg.appendChild(se('path',{d:LEAVES[lfi].d, fill:LEAVES[lfi].f}));
    dsvg.appendChild(se('path',{d:LEAVES[lfi].m, stroke:'#1e5028','stroke-width':'1', fill:'none', opacity:'0.55'}));
  }

  dsvg.appendChild(se('ellipse',{cx:CX, cy:CY+DRY*0.62, rx:DRX*0.56, ry:DRY*0.24, fill:'#3a5c24'}));
  dsvg.appendChild(se('ellipse',{cx:CX, cy:CY+DRY*0.54, rx:DRX*0.46, ry:DRY*0.18, fill:'#527535'}));

  for (var si2=0; si2<SEEDS.length; si2++) {
    var s = SEEDS[si2];
    var cR = contact(s.angle);
    var ix = CX+Math.cos(s.angle)*cR,    iy = CY+Math.sin(s.angle)*cR;
    var ox = CX+Math.cos(s.angle)*s.totalR, oy = CY+Math.sin(s.angle)*s.totalR;
    var ax = ix+Math.cos(s.angle)*3.5,   ay = iy+Math.sin(s.angle)*3.5;
    var aDeg = s.angle*180/Math.PI+90;
    var stalkD;
    if (s.bend > 0.5) {
      var mx=(ix+ox)/2, my=(iy+oy)/2;
      stalkD = 'M'+ix+','+iy+' Q'+(mx-Math.sin(s.angle)*s.bend*s.bside)+','+(my+Math.cos(s.angle)*s.bend*s.bside)+' '+ox+','+oy;
    } else {
      stalkD = 'M'+ix+','+iy+' L'+ox+','+oy;
    }
    var g = se('g',{opacity:s.op});
    g.appendChild(se('path',{d:stalkD, stroke:'rgba(255,255,255,0.42)','stroke-width':'0.7', fill:'none','stroke-linecap':'round'}));
    g.appendChild(se('ellipse',{cx:ax, cy:ay, rx:'1.5', ry:String(s.ah/2), transform:'rotate('+aDeg+','+ax+','+ay+')', fill:'rgba(200,182,140,0.88)'}));
    g.appendChild(se('circle',{cx:ax, cy:ay, r:'2.2', fill:'rgba(175,158,112,0.80)'}));
    for (var k=0; k<s.rays; k++) {
      var ra = s.angle - s.spread + (k/(s.rays-1))*2*s.spread;
      var tx = ox+Math.cos(ra)*s.rl, ty = oy+Math.sin(ra)*s.rl;
      g.appendChild(se('line',{x1:ox, y1:oy, x2:tx, y2:ty, stroke:'rgba(255,255,255,0.72)','stroke-width':'0.52','stroke-linecap':'round'}));
      g.appendChild(se('circle',{cx:tx, cy:ty, r:'1.15', fill:'rgba(255,255,255,0.82)'}));
    }
    dsvg.appendChild(g);
    seedEls.push(g);
  }

  /* dome — on top of seeds */
  dsvg.appendChild(se('ellipse',{cx:CX, cy:CY+3,        rx:DRX+4,     ry:DRY*0.26, fill:'rgba(20,12,4,0.28)'}));
  dsvg.appendChild(se('ellipse',{cx:CX, cy:CY,           rx:DRX,       ry:DRY,      fill:'url(#df)'}));
  dsvg.appendChild(se('ellipse',{cx:CX, cy:CY+DRY*0.68, rx:DRX*0.72,  ry:DRY*0.24, fill:'rgba(35,22,8,0.20)'}));
  dsvg.appendChild(se('ellipse',{cx:CX-11, cy:CY-15,    rx:'15',       ry:'9',      fill:'rgba(255,255,255,0.07)'}));
  for (var di=0; di<SEEDS.length; di++) {
    var ds = SEEDS[di];
    var dcR = contact(ds.angle);
    var dsx = CX+Math.cos(ds.angle)*(dcR-3), dsy = CY+Math.sin(ds.angle)*(dcR-3);
    dsvg.appendChild(se('ellipse',{cx:dsx, cy:dsy, rx:'2.6', ry:'1.5', transform:'rotate('+(ds.angle*180/Math.PI+90)+','+dsx+','+dsy+')', fill:'rgba(18,10,2,0.26)'}));
  }

  /* front seeds — frontal view: short stalk + rays 360°, with shadow, fly on blow */
  var FCOUNT = 16;
  for (var fi=0; fi<FCOUNT; fi++) {
    var fa  = (fi/FCOUNT)*Math.PI*2 + (sr(fi*17+1)-0.5)*0.55;
    var fr  = (sr(fi*17+2)*0.58 + 0.14) * DRX * 0.80;
    var fsx = CX + Math.cos(fa) * fr * 0.90;
    var fsy = CY + Math.sin(fa) * fr * 0.76;
    var flen   = 4 + sr(fi*17+4)*4;
    var fang   = fa + (sr(fi*17+3)-0.5)*0.3;
    var fox    = fsx + Math.cos(fang)*flen;
    var foy    = fsy + Math.sin(fang)*flen;
    var fop    = 0.62 + sr(fi*17+5)*0.32;
    var frays2 = 12;
    var frl2   = 10 + sr(fi*17+6)*6;

    /* shadow behind seed */
    dsvg.appendChild(se('ellipse',{
      cx:String(fsx+1.5), cy:String(fsy+2.5),
      rx:'3', ry:'1.6',
      fill:'rgba(14,8,2,0.28)'
    }));

    var fg2 = se('g',{opacity:fop});
    /* short stalk */
    fg2.appendChild(se('line',{x1:fsx,y1:fsy,x2:fox,y2:foy,
      stroke:'rgba(255,255,255,0.42)','stroke-width':'0.7','stroke-linecap':'round'}));
    /* seed grain */
    fg2.appendChild(se('ellipse',{cx:fsx,cy:fsy,rx:'1.3',ry:'3.2',
      transform:'rotate('+(fang*180/Math.PI+90)+','+fsx+','+fsy+')',
      fill:'rgba(195,175,125,0.88)'}));
    fg2.appendChild(se('circle',{cx:fsx,cy:fsy,r:'2',fill:'rgba(165,145,98,0.82)'}));
    /* rays 360° around tip */
    for (var fk=0; fk<frays2; fk++) {
      var fra2 = (fk/frays2)*Math.PI*2;
      var ftx2 = fox + Math.cos(fra2)*frl2;
      var fty2 = foy + Math.sin(fra2)*frl2;
      fg2.appendChild(se('line',{x1:fox,y1:foy,x2:ftx2,y2:fty2,
        stroke:'rgba(255,255,255,0.68)','stroke-width':'0.5','stroke-linecap':'round'}));
      fg2.appendChild(se('circle',{cx:ftx2,cy:fty2,r:'1.0',fill:'rgba(255,255,255,0.80)'}));
    }
    dsvg.appendChild(fg2);

    /* register for fly animation */
    SEEDS.push({
      dx:    (sr(fi*19+0)-0.28)*780,
      dy:    -(sr(fi*19+1)*540+220),
      dr:    (sr(fi*19+2)-0.5)*980,
      delay: sr(fi*19+3)*1.4
    });
    seedEls.push(fg2);
  }

  /* tap to blow */
  dsvg.addEventListener('click', blow);

} catch(e) {
  console.warn('SVG build error:', e);
}

/* ═══════════════════════════════════════════
   STEP 6 — wish seed
═══════════════════════════════════════════ */
try {
  var wsvg = document.getElementById('wsvg');
  var wa=-Math.PI/2-0.08, wix=60, wiy=105;
  var wox=wix+Math.cos(wa)*82, woy=wiy+Math.sin(wa)*82;
  var wsp=(90*Math.PI)/180, wrl=32;
  wsvg.appendChild(se('line',{x1:wix,y1:wiy,x2:wox,y2:woy,stroke:'rgba(255,255,255,.58)','stroke-width':'1','stroke-linecap':'round'}));
  wsvg.appendChild(se('ellipse',{cx:wix, cy:wiy-5, rx:'2.2', ry:'8', fill:'rgba(210,192,148,0.90)'}));
  wsvg.appendChild(se('circle',{cx:wix, cy:wiy, r:'3.5', fill:'rgba(185,166,118,0.82)'}));
  for (var wk=0; wk<14; wk++) {
    var wra = wa - wsp + (wk/13)*2*wsp;
    var wtx = wox+Math.cos(wra)*wrl, wty = woy+Math.sin(wra)*wrl;
    wsvg.appendChild(se('line',{x1:wox,y1:woy,x2:wtx,y2:wty,stroke:'rgba(255,255,255,.78)','stroke-width':'.65','stroke-linecap':'round'}));
    wsvg.appendChild(se('circle',{cx:wtx,cy:wty,r:'1.5',fill:'rgba(255,255,255,.86)'}));
  }
} catch(e) { console.warn('Wish seed build error:', e); }

/* ═══════════════════════════════════════════
   STEP 7 — mic & blow logic
═══════════════════════════════════════════ */
function startMic() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream) {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var src = ctx.createMediaStreamSource(stream);
    var an = ctx.createAnalyser(); an.fftSize = 256;
    src.connect(an);
    var data = new Uint8Array(an.frequencyBinCount);
    (function detect() {
      an.getByteFrequencyData(data);
      var sum = 0; for (var i=0; i<data.length; i++) sum += data[i];
      if (sum/data.length > 55) blow();
      requestAnimationFrame(detect);
    })();
  }).catch(function(){});
}

function blow() {
  if (blown) return;
  blown = true;

  var h = document.getElementById('hint');
  var th = document.getElementById('tap-hint');
  if (h)  h.style.opacity  = '0';
  if (th) th.style.opacity = '0';
  var ds = document.getElementById('dsvg');
  if (ds) ds.style.cursor = 'default';

  for (var i=0; i<seedEls.length; i++) {
    var g = seedEls[i], s = SEEDS[i];
    g.style.setProperty('--dx', s.dx+'px');
    g.style.setProperty('--dy', s.dy+'px');
    g.style.setProperty('--dr', s.dr+'deg');
    g.style.animationDelay = s.delay+'s';
    g.classList.add('fly');
  }

  try {
    var body = 'entry.1196602189='+encodeURIComponent('Jornada conclu\u00edda!');
    fetch(FORM_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:body}).catch(function(){});
    fetch('https://a205851a-8eed-42af-8612-b6779a6b3e58-00-1lhi3a6iwiofq.picard.replit.dev/api/sinal', {method:'POST'}).catch(function(){});
  } catch(e) {}

  setTimeout(function() {
    showOnly('wish');
    var wt1 = document.getElementById('wt1');
    var wt2 = document.getElementById('wt2');
    if (wt1) {
      wt1.classList.add('do-fade-in');
      wt1.style.opacity = '1';
      setTimeout(function() {
        wt1.classList.remove('do-fade-in');
        wt1.style.opacity = '0';
        setTimeout(function() {
          if (wt2) {
            wt2.classList.add('do-fade-in');
            wt2.style.opacity = '1';
          }
        }, 1700);
      }, 4200);
    }
  }, 4400);
}
</script>
</body>
</html>
